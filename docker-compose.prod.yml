services:
  frontend:
    image: areasettantotto/frontend-1:latest
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - REACT_APP_API_URL=http://backend:4000
    restart: always
    networks:
      - app-network

  backend:
    image: areasettantotto/backend-1:latest
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    restart: always
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
